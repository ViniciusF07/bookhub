{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-5">
                <i class="fa-solid fa-triangle-exclamation text-danger fa-5x mb-4"></i>
                <h1 class="display-1 fw-bold text-danger">500</h1>
                <h2 class="fw-bold mb-3">Erro Interno do Servidor</h2>
                <p class="text-muted mb-4">
                    Algo deu errado em nossos servidores. Por favor, tente novamente mais tarde.
                </p>
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
                        <i class="fa-solid fa-house me-2"></i>Voltar ao Dashboard
                    </a>
                    <a href="javascript:location.reload()" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-rotate me-2"></i>Recarregar Página
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
