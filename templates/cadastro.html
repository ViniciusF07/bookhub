{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4">Criar Nova Conta</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required placeholder="Ex: João Silva">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" required placeholder="seu@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-control" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 shadow-sm mb-3">Registrar</button>
                </form>
                <div class="text-center">
                    <span class="small text-muted">Já é cadastrado? <a href="{{ url_for('login') }}" class="text-decoration-none">Faça Login</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
