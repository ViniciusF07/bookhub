{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center align-items-center my-5">
    <div class="col-md-5">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h2 class="text-center fw-bold mb-4">Entrar no BookHub</h2>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-content form-control-lg form-control" required placeholder="seu@email.com">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Senha</label>
                        <input type="password" name="senha" class="form-content form-control-lg form-control" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm mb-3">Acessar Sistema</button>
                </form>
                <div class="text-center">
                    <span class="small text-muted">Não possui conta? <a href="{{ url_for('cadastro') }}" class="text-decoration-none">Cadastre-se</a></span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
